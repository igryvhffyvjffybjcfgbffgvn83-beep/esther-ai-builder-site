    function setActive(id) { activeId = id; selectedDay = heatmapDays.find(d => d.eventId === id) || selectedDay; render(); }

    function renderTabs() {
      $("tabs").innerHTML = tabs.map(t => `<button class="tab ${activeTab === t ? "active" : ""}" data-tab="${t}">${t}</button>`).join("");
      document.querySelectorAll("[data-tab]").forEach(b => b.onclick = () => setTab(b.dataset.tab));
      document.querySelectorAll("[data-tab-go]").forEach(b => b.onclick = () => setTab(b.dataset.tabGo));
      $("unlock").textContent = showFull ? "Unlocked Preview" : "🔒 Unlock Full Report";
      $("unlock").onclick = () => { showFull = !showFull; renderTabs(); };
    }

    function overview() {
      const ae = activeEvent(), top = [...events].sort((a,b) => b.score - a.score).slice(0,3);
      return `
        <div class="grid">
          <div class="card hero"><div class="hero-grid">
            <div><div class="eyebrow">Summary</div><h1>Nov is strongest.</h1><p class="sub">18 love-related hits found.</p></div>
            <div class="peak-box"><div class="small">Peak Score</div><div class="peak-num">96</div><div class="small">The strongest window appears on Nov 14.</div></div>
          </div></div>
          <div class="grid kpis">
            ${kpi("Peak Month","Nov")}${kpi("Top Score","96")}${kpi("Exact Hits","18")}${kpi("Tightest Orb","0°00′")}
          </div>
          <div class="grid dash">
            <div class="card pad">
              <div class="section-head"><div><h2>Love Timing Heatmap</h2><p class="small">Darker cells = stronger activation.</p></div><div class="small">Oct 01 → Dec 31</div></div>
              <div class="month-grid">
                ${months.map(m => `<div class="month-card"><div class="month-title"><b>${m.name}</b><span class="small">2026</span></div>
                  <div class="weekday-row">${["S","M","T","W","T","F","S"].map(w => `<div class="weekday">${w}</div>`).join("")}</div>
                  <div class="days">
                    ${Array.from({length:m.offset}, () => `<span class="heat blank"></span>`).join("")}
                    ${heatmapDays.filter(d => d.month === m.name).map(d => `<button class="heat ${scoreClass(d.score)} ${d.eventId ? "event" : ""} ${d.eventId === ae.id ? "active" : ""}" data-day="${d.iso}" title="${d.date} · Score ${d.score}">${d.day}</button>`).join("")}
                  </div>
                </div>`).join("")}
              </div>
              <div class="selected-day">
                ${selectedBox("Selected", selectedDay.date)}${selectedBox("Score", selectedDay.score)}
                ${selectedBox("Transit", selectedDay.eventId ? events.find(e => e.id === selectedDay.eventId).formula.replace("Transit ","") : "No exact hit")}
                ${selectedBox("Window", selectedDay.eventId ? events.find(e => e.id === selectedDay.eventId).title : "Baseline day")}
              </div>
            </div>
            <div class="card pad"><h2>Top Windows</h2>
              ${top.map((e,i) => eventCard(e, false, `#${i+1}`, true)).join("")}
            </div>
          </div>
          <div class="grid two">
            <div class="card pad"><h2>Monthly Strength</h2>${[["Oct",74],["Nov",96],["Dec",81]].map(([m,v]) => `<div class="bar-row"><div class="bar-top"><span>${m}</span><b>${v}${m==="Nov" ? " · Peak" : ""}</b></div>${bar(v)}</div>`).join("")}</div>
            <div class="card pad"><h2>Theme Distribution</h2>${[["Attraction","2 hits · avg 91",91],["Ease","1 hit · avg 86",86],["Tension","1 hit · avg 72",72],["Clarity","2 hits · avg 89",89]].map(([t,m,v]) => `<div class="bar-row"><div class="bar-top"><span>${t}</span><span>${m}</span></div>${bar(v)}</div>`).join("")}</div>
          </div>
        </div>`;
    }
    function kpi(label, value) { return `<div class="card pad"><div class="label">${label}</div><div class="value">${value}</div></div>`; }
    function selectedBox(label, value) { return `<div><div class="small">${label}</div><b>${value}</b></div>`; }
    function eventCard(e, active=false, prefix="", evidenceBtn=false) {
      return `<button class="event ${active ? "active" : ""}" data-event="${e.id}">
        <div class="event-top"><div><div class="small">${prefix ? prefix + " · " : ""}${e.date} · ${e.time}</div><b><span style="opacity:.5;margin-right:4px">${planetIcon(e.planet)}</span>${e.title}</b><div class="small" style="margin-top:5px">${e.formula}</div><span class="tag" style="background:${themeColor(e.theme)}20;color:${themeColor(e.theme)};border-color:${themeColor(e.theme)}30">${e.tag}</span> <span class="tag">orb ${e.orb}</span></div><span class="score">${e.score}</span></div>
        <div style="margin-top:13px">${bar(e.score)}</div>
        ${evidenceBtn ? `<button class="btn" style="margin-top:12px;padding:7px 12px" data-evidence="${e.id}">View evidence →</button>` : ""}
      </button>`;
    }

    function filteredEvents() {
      let out = events.filter(e => {
        const scoreMin = filters.score === "All" ? 0 : Number(filters.score.replace("+",""));
        const orbMax = filters.orb === "≤0°10′" ? 10 : filters.orb === "≤0°30′" ? 30 : filters.orb === "≤1°" ? 60 : Infinity;
        return (filters.theme === "All" || e.theme === filters.theme) && e.score >= scoreMin && (filters.planet === "All" || e.planet === filters.planet) && orbMins(e.orb) <= orbMax;
      });
      if (filters.sort === "Score") out.sort((a,b)=>b.score-a.score);
      if (filters.sort === "Orb") out.sort((a,b)=>orbMins(a.orb)-orbMins(b.orb));
      if (filters.sort === "Date") out.sort((a,b)=>a.iso.localeCompare(b.iso));
      return out;
    }
    function pills(name, opts) {
      return `<div><div class="filter-title">${name}</div><div class="pills">${opts.map(o => `<button class="pill ${filters[name.toLowerCase()] === o ? "active" : ""}" data-filter="${name.toLowerCase()}" data-value="${escapeAttr(o)}">${o}</button>`).join("")}</div></div>`;
    }
    function timeline() {
      const list = filteredEvents(), detail = list.find(e => e.id === activeId) || list[0] || activeEvent();
      return `<div class="grid">
        <div class="card pad grid filters">
          ${pills("Theme",["All","Attraction","Ease","Tension","Clarity"])}
          ${pills("Score",["All","70+","85+","95+"])}
          ${pills("Orb",["All","≤1°","≤0°30′","≤0°10′"])}
          ${pills("Planet",["All","Venus","Mercury","Jupiter","Saturn","Sun"])}
          ${pills("Sort",["Date","Score","Orb"])}
        </div>
        <div class="grid timeline-grid">
          <div class="card pad">${list.map(e => eventCard(e, e.id === detail.id)).join("") || `<div class="small">No matching events.</div>`}</div>
          <div class="card pad detail">${detailPanel(detail)}</div>
        </div>
      </div>`;
    }
    function detailPanel(e) {
      return `<div class="event-top"><div><div class="small">${e.date} · ${e.time}</div><h2 style="font-size:34px;margin-top:8px">${e.title}</h2><div class="small" style="margin-top:8px">${e.formula}</div></div><span class="score" style="font-size:28px;border-radius:18px;padding:12px 16px">${e.score}</span></div>
      <div class="grid metrics">${Object.entries({Attraction:e.metrics.attraction,Ease:e.metrics.ease,Tension:e.metrics.tension,Clarity:e.metrics.clarity}).map(([k,v]) => `<div class="card pad"><div class="bar-top"><span>${k}</span><b>${v}</b></div>${bar(v)}</div>`).join("")}</div>
      <div class="action"><div class="label">Action</div><div style="margin-top:8px">${e.action}</div></div>
      <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn primary" data-go-evidence="${e.id}">View full evidence</button><button class="btn glow" data-go-export="${e.id}">Export this date</button></div>`;
    }

    function evidence() {
      const e = activeEvent(), ep = e.evidence, tp = ep.transit.split(" · "), np = ep.natal.split(" · ");
      const table = [["Transit Planet",tp[0]],["Transit Longitude",tp[1]],["Natal Point",np[0]],["Natal Longitude",np[1]],["Aspect",ep.aspect],["Aspect Angle",ep.aspectAngle],["Orb",ep.orb],["House Layer",ep.house],["Theme Mapping",ep.themeMapping]];
      return `<div class="grid">
        <div class="card pad"><div class="section-head"><h2>Event Selector</h2><span class="small">${e.date} · ${e.title}</span></div><div class="chips">${events.map(x => `<button class="chip ${x.id === e.id ? "active" : ""}" data-event="${x.id}">${x.date} · ${x.score}</button>`).join("")}</div></div>
        <div class="card pad"><div class="event-top"><div><div class="small">${e.date} · ${e.time}</div><h2 style="font-size:32px;margin-top:8px">${e.formula}</h2><p class="sub" style="font-size:16px">This date is marked because ${ep.transit} forms ${ep.aspect} to ${ep.natal}.</p></div><span class="score" style="font-size:28px;border-radius:18px;padding:12px 16px">${e.score}</span></div></div>
        <div class="grid two">
          <div class="card pad"><h2>Calculation Table</h2><div class="table">${table.map(([a,b]) => `<div class="tr"><div class="td">${a}</div><div class="td">${b}</div></div>`).join("")}</div></div>
          <div class="card pad"><h2>Score Breakdown</h2>${e.scoreBreakdown.map(([a,b]) => `<div class="bar-row"><div class="bar-top"><span>${a}</span><b>${b}</b></div>${bar(Math.round(b / e.score * 100))}</div>`).join("")}<div class="action"><div class="bar-top"><span>Total</span><b style="font-size:26px">${e.score}</b></div></div></div>
        </div>
        <div class="grid two">
          <div class="card pad"><h2>Why This Matters</h2>${why(e).map(x => `<div class="matter">${x}</div>`).join("")}</div>
          <div class="card pad"><h2>Method Panel</h2>${[["Zodiac","Tropical"],["View","Geocentric"],["House System","Placidus"],["Ephemeris","Swiss Ephemeris style demo"],["Aspects","0°, 60°, 90°, 120°, 180°"],["Orb threshold","≤1°"],["Time zone","local report time"]].map(([a,b]) => `<div class="matter"><span class="small">${a}</span><br><b>${b}</b></div>`).join("")}</div>
        </div>
      </div>`;
    }
    function why(e) {
      return ({
        Venus:["Venus marks attraction and receptivity.","Mars adds desire and friction.","Square aspects raise heat.","A 0°04′ orb is very tight."],
        Mercury:["Mercury opens contact.","Venus softens the exchange.","Trines reduce resistance.","A 0°08′ orb keeps the signal clean."],
        Jupiter:["Jupiter expands visibility.","DSC is the relationship axis.","Conjunctions concentrate the theme.","A 0°00′ orb is exact."],
        Saturn:["Saturn tests consistency.","Venus shows attachment patterns.","Oppositions reveal pressure.","A 0°11′ orb is still close."],
        Sun:["Sun brings awareness.","Moon tracks emotional response.","Trines support ease.","A 0°03′ orb is precise."]
      })[e.planet] || [];
    }

    function exportView() {
      const e = activeEvent(), top = [...events].sort((a,b)=>b.score-a.score);
      let preview = "";
      if (exportType === "Summary Card") preview = `<div class="export-card"><div class="eyebrow">Exact Transit</div><h2 style="font-size:40px;margin-top:14px">Avery’s Love Timing</h2><div class="small">Oct–Dec 2026</div><div class="grid two" style="margin-top:24px">${kpi("Peak Month","Nov")}${kpi("Top Score","96")}</div><div style="margin-top:18px">${top.slice(0,3).map(x=>`<button class="event" data-event="${x.id}"><div class="event-top"><span>${x.date} · ${x.title}</span><b>${x.score}</b></div></button>`).join("")}</div><div class="small" style="margin-top:24px;border-top:1px solid var(--line);padding-top:16px">Every date has a reason.</div></div>`;
      if (exportType === "Single Date Card") preview = `<div class="export-card" style="background:linear-gradient(135deg,#020617,rgba(112,26,117,.45))"><div class="event-top"><div><div class="small">${e.date} · ${e.time}</div><h2 style="font-size:40px;margin-top:12px">${e.title}</h2></div><span class="score" style="font-size:30px;border-radius:18px;padding:12px 16px">${e.score}</span></div><div class="action">${e.formula}<br><span class="small">Orb ${e.orb}</span></div><p class="sub" style="font-size:16px">${e.action}</p><div class="eyebrow" style="margin-top:26px">Exact Transit</div></div>`;
      if (exportType === "Full Snapshot") preview = `<div class="export-card" style="max-width:760px"><div class="section-head"><div><div class="eyebrow">Full Snapshot</div><h2 style="font-size:34px;margin-top:8px">Oct–Dec 2026</h2></div><div class="badges"><span class="badge">Peak Nov</span><span class="badge">Score 96</span><span class="badge">18 hits</span></div></div><div class="grid kpis">${kpi("Peak","Nov")}${kpi("Top","96")}${kpi("Exact","18")}${kpi("Orb","0°00′")}</div><div class="mini-heat">${heatmapDays.map(d => `<span class="${scoreClass(d.score)}"></span>`).join("")}</div><div style="margin-top:18px">${top.map(x=>`<button class="event" data-event="${x.id}"><div class="event-top"><span>${x.date} · ${x.title}</span><b>${x.score}</b></div></button>`).join("")}</div><div class="badges" style="margin-top:18px"><span class="badge">Tropical</span><span class="badge">Geocentric</span><span class="badge">Placidus</span><span class="badge">Orb ≤ 1°</span></div></div>`;
      return `<div class="grid">
        <div class="card pad profile-row"><div><h2>Export Type</h2><div class="small">Mock share preview.</div></div><div class="pills">${["Summary Card","Single Date Card","Full Snapshot"].map(t=>`<button class="pill ${exportType === t ? "active" : ""}" data-export="${t}">${t}</button>`).join("")}</div></div>
        <div class="card pad">${preview}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn primary" data-notice="Download PNG">Download PNG</button><button class="btn primary" data-notice="Copy Summary">Copy Summary</button><button class="btn primary" data-notice="Save PDF">Save PDF</button><span class="notice" id="notice"></span></div>
      </div>`;
    }

    function bind() {
      document.querySelectorAll("[data-day]").forEach(b => b.onclick = () => {
        selectedDay = heatmapDays.find(d => d.iso === b.dataset.day);
        if (selectedDay.eventId) activeId = selectedDay.eventId;
        render();
      });
      document.querySelectorAll("[data-event]").forEach(b => b.onclick = (ev) => { ev.stopPropagation(); setActive(+b.dataset.event); });
      document.querySelectorAll("[data-evidence], [data-go-evidence]").forEach(b => b.onclick = (ev) => { ev.stopPropagation(); activeId = +(b.dataset.evidence || b.dataset.goEvidence); setTab("Evidence"); });
      document.querySelectorAll("[data-go-export]").forEach(b => b.onclick = (ev) => { ev.stopPropagation(); activeId = +b.dataset.goExport; setTab("Export"); });
      document.querySelectorAll("[data-filter]").forEach(b => b.onclick = () => { filters[b.dataset.filter] = b.dataset.value; render(); });
      document.querySelectorAll("[data-export]").forEach(b => b.onclick = () => { exportType = b.dataset.export; render(); });
      document.querySelectorAll("[data-notice]").forEach(b => b.onclick = () => { const n = $("notice"); n.textContent = `${b.dataset.notice}: Demo only`; setTimeout(() => n.textContent = "", 1600); });
    }

    function render() {
      renderTabs();
      $("Overview").innerHTML = overview();
      $("Timeline").innerHTML = timeline();
      $("Evidence").innerHTML = evidence();
      $("Export").innerHTML = exportView();
      tabs.forEach(t => $(t).classList.toggle("active", activeTab === t));
      bind();
    }
    render();
  </script>
  <script>
    // Starfield animation
    (function() {
      const canvas = document.getElementById('stars-canvas');
      const ctx = canvas.getContext('2d');
      let w, h, stars = [];
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      function init() {
        resize();
        stars = Array.from({ length: 120 }, () => ({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.2 + 0.3,
          a: Math.random() * 0.5 + 0.15,
          da: (Math.random() - 0.5) * 0.008,
          dy: Math.random() * 0.08 + 0.01,
        }));
      }
      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (const s of stars) {
          s.a += s.da;
          if (s.a > 0.65 || s.a < 0.1) s.da *= -1;
          s.y += s.dy;
          if (s.y > h + 2) { s.y = -2; s.x = Math.random() * w; }
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${s.a})`;
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resize);
      init();
      draw();
    })();
  </script>
</body>
</html>
